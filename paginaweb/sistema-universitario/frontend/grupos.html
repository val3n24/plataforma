<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos - Ingenieria en Sistemas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3a6e 0%, #0d2b4e 100%);
            min-height: 100vh;
        }

        /* Barra de navegacion superior */
        .navbar {
            background: #0d2b4e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.activo {
            background: #3b82f6;
            color: white;
        }

        .contenedor {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Seccion de grupos */
        .seccion-grupos {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .seccion-grupos h2 {
            color: #1e293b;
            font-size: 22px;
            margin-bottom: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eef2f6;
        }

        .seccion-grupos p {
            color: #6c757d;
            margin-bottom: 20px;
        }

        /* Filtros de semestre */
        .filtros-semestre {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eef2f6;
        }

        .btn-semestre {
            padding: 8px 20px;
            background: #f1f5f9;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            color: #475569;
        }

        .btn-semestre:hover {
            background: #e2e8f0;
        }

        .btn-semestre.activo {
            background: #3b82f6;
            color: white;
        }

        /* Filtros de tipo */
        .filtros-tipo {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn-filtro {
            padding: 8px 20px;
            background: #f1f5f9;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            color: #475569;
        }

        .btn-filtro:hover {
            background: #e2e8f0;
        }

        .btn-filtro.activo {
            background: #3b82f6;
            color: white;
        }

        /* Buscador */
        .buscador {
            margin-bottom: 25px;
        }

        .buscador input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 1px solid #d0d5db;
            border-radius: 10px;
            font-size: 14px;
        }

        .buscador input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* Grid de grupos */
        .grid-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* Tarjeta de grupo */
        .tarjeta-grupo {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid #eef2f6;
        }

        .tarjeta-grupo:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #3b82f6;
        }

        .tarjeta-grupo h3 {
            color: #1e293b;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .tarjeta-grupo p {
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .info-grupo {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .semestre {
            background: #eef2ff;
            color: #3b82f6;
            padding: 4px 10px;
            border-radius: 15px;
        }

        .tipo {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 10px;
            border-radius: 15px;
        }

        .miembros {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 10px;
            border-radius: 15px;
        }

        .btn-unirse {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-unirse:hover {
            background: #2563eb;
        }

        .btn-unirse.unido {
            background: #10b981;
        }

        .btn-unirse.unido:hover {
            background: #059669;
        }

        /* Mis grupos seccion */
        .mis-grupos {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .mis-grupos h2 {
            color: #1e293b;
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
        }

        .mis-grupos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .mi-grupo-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mi-grupo-info h4 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .mi-grupo-info p {
            font-size: 12px;
            color: #6c757d;
        }

        .btn-salir {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-salir:hover {
            background: #b91c1c;
        }

        .sin-resultados {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1001;
            animation: fadeInOut 3s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .contenedor {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Barra de navegacion superior -->
    <div class="navbar">
        <div class="logo">
            <h1>Plataforma Academica - Ingenieria en Sistemas</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="grupos.html" class="nav-link activo">Grupos</a>
            <a href="tareas.html" class="nav-link">Tareas</a>
            <a href="recursos.html" class="nav-link">Recursos</a>
            <a href="calendario.html" class="nav-link">Calendario</a>
        </div>
    </div>

    <div class="contenedor">
        <!-- Mis Grupos -->
        <div class="mis-grupos">
            <h2>Mis Grupos</h2>
            <div id="misGruposGrid" class="mis-grupos-grid"></div>
        </div>

        <!-- Grupos Disponibles -->
        <div class="seccion-grupos">
            <h2>Grupos por semestre</h2>
            <p>Grupos organizados por semestre de la carrera de Ingenieria en Sistemas</p>

            <div class="buscador">
                <input type="text" id="buscador" placeholder="Buscar grupo por nombre...">
            </div>

            <!-- Filtros por Semestre -->
            <div class="filtros-semestre">
                <button class="btn-semestre activo" data-semestre="todos">Todos los Semestres</button>
                <button class="btn-semestre" data-semestre="1">Primer Semestre</button>
                <button class="btn-semestre" data-semestre="2">Segundo Semestre</button>
                <button class="btn-semestre" data-semestre="3">Tercer Semestre</button>
                <button class="btn-semestre" data-semestre="4">Cuarto Semestre</button>
                <button class="btn-semestre" data-semestre="5">Quinto Semestre</button>
                <button class="btn-semestre" data-semestre="6">Sexto Semestre</button>
                <button class="btn-semestre" data-semestre="7">Septimo Semestre</button>
                <button class="btn-semestre" data-semestre="8">Octavo Semestre</button>
            </div>

            <!-- Filtros por Tipo -->
            <div class="filtros-tipo">
                <button class="btn-filtro activo" data-tipo="todos">Todos</button>
                <button class="btn-filtro" data-tipo="programacion">Programacion</button>
                <button class="btn-filtro" data-tipo="matematicas">Matematicas</button>
                <button class="btn-filtro" data-tipo="ciencias">Ciencias Basicas</button>
                <button class="btn-filtro" data-tipo="gestion">Gestion</button>
            </div>

            <div id="gridGrupos" class="grid-grupos"></div>
        </div>
    </div>

    <script>
        // ========== DATOS DE GRUPOS - POR SEMESTRE ==========
        let gruposDisponibles = [
            // Primer Semestre
            { id: 1, nombre: "Introduccion a la Ingenieria", semestre: 1, tipo: "programacion", descripcion: "Fundamentos de la ingenieria en sistemas y metodologia de estudio", miembros: 45 },
            { id: 2, nombre: "Calculo Diferencial", semestre: 1, tipo: "matematicas", descripcion: "Limites, derivadas y aplicaciones de la derivada", miembros: 52 },
            { id: 3, nombre: "Algebra Lineal", semestre: 1, tipo: "matematicas", descripcion: "Matrices, vectores, espacios vectoriales y transformaciones", miembros: 48 },
            { id: 4, nombre: "Fisica General", semestre: 1, tipo: "ciencias", descripcion: "Mecanica clasica, cinematica, dinamica y leyes de Newton", miembros: 44 },
            
            // Segundo Semestre
            { id: 5, nombre: "Programacion Basica", semestre: 2, tipo: "programacion", descripcion: "Fundamentos de programacion con pseudocodigo y Python", miembros: 56 },
            { id: 6, nombre: "Calculo Integral", semestre: 2, tipo: "matematicas", descripcion: "Integrales, tecnicas de integracion y aplicaciones", miembros: 41 },
            { id: 7, nombre: "Fisica de Campos", semestre: 2, tipo: "ciencias", descripcion: "Electricidad, magnetismo y campos electromagneticos", miembros: 38 },
            { id: 8, nombre: "Matematicas Discretas", semestre: 2, tipo: "matematicas", descripcion: "Logica, conjuntos, relaciones, grafos y arboles", miembros: 43 },
            
            // Tercer Semestre
            { id: 9, nombre: "Estructura de Datos", semestre: 3, tipo: "programacion", descripcion: "Arreglos, listas, pilas, colas, arboles y grafos", miembros: 49 },
            { id: 10, nombre: "Ecuaciones Diferenciales", semestre: 3, tipo: "matematicas", descripcion: "Ecuaciones diferenciales ordinarias y aplicaciones", miembros: 35 },
            { id: 11, nombre: "Arquitectura de Computadores", semestre: 3, tipo: "programacion", descripcion: "Estructura y funcionamiento de computadoras", miembros: 42 },
            { id: 12, nombre: "Probabilidad y Estadistica", semestre: 3, tipo: "matematicas", descripcion: "Probabilidad, distribuciones y analisis estadistico", miembros: 47 },
            
            // Cuarto Semestre
            { id: 13, nombre: "Base de Datos", semestre: 4, tipo: "programacion", descripcion: "SQL, modelo relacional, normalizacion y diseno de BD", miembros: 53 },
            { id: 14, nombre: "Sistemas Operativos", semestre: 4, tipo: "programacion", descripcion: "Gestion de procesos, memoria, archivos y E/S", miembros: 46 },
            { id: 15, nombre: "Redes de Computadoras", semestre: 4, tipo: "programacion", descripcion: "Protocolos, OSI, TCP/IP, routing y seguridad", miembros: 44 },
            { id: 16, nombre: "Metodos Numericos", semestre: 4, tipo: "matematicas", descripcion: "Metodos numericos para solucion de problemas", miembros: 39 },
            
            // Quinto Semestre
            { id: 17, nombre: "Ingenieria de Software", semestre: 5, tipo: "programacion", descripcion: "Ciclos de vida, metodologias agiles y desarrollo", miembros: 58 },
            { id: 18, nombre: "Lenguajes de Programacion", semestre: 5, tipo: "programacion", descripcion: "Paradigmas de programacion y lenguajes", miembros: 51 },
            { id: 19, nombre: "Analisis de Algoritmos", semestre: 5, tipo: "programacion", descripcion: "Complejidad algoritmica y optimizacion", miembros: 43 },
            { id: 20, nombre: "Desarrollo Web", semestre: 5, tipo: "programacion", descripcion: "HTML, CSS, JavaScript y frameworks frontend", miembros: 62 },
            
            // Sexto Semestre
            { id: 21, nombre: "Inteligencia Artificial", semestre: 6, tipo: "programacion", descripcion: "Algoritmos de busqueda, redes neuronales y aprendizaje", miembros: 54 },
            { id: 22, nombre: "Calidad de Software", semestre: 6, tipo: "programacion", descripcion: "Pruebas, aseguramiento de calidad y metricas", miembros: 41 },
            { id: 23, nombre: "Interfaces de Usuario", semestre: 6, tipo: "programacion", descripcion: "Diseño UX/UI, usabilidad y experiencia de usuario", miembros: 47 },
            { id: 24, nombre: "Investigacion de Operaciones", semestre: 6, tipo: "matematicas", descripcion: "Optimizacion, programacion lineal y simulacion", miembros: 38 },
            
            // Septimo Semestre
            { id: 25, nombre: "Gestion de Proyectos", semestre: 7, tipo: "gestion", descripcion: "Planificacion, ejecucion y control de proyectos TI", miembros: 49 },
            { id: 26, nombre: "Seguridad Informatica", semestre: 7, tipo: "programacion", descripcion: "Ciberseguridad, cifrado y proteccion de datos", miembros: 52 },
            { id: 27, nombre: "Computacion Grafica", semestre: 7, tipo: "programacion", descripcion: "Graficos 2D, 3D, transformaciones y rendering", miembros: 40 },
            { id: 28, nombre: "Desarrollo Movil", semestre: 7, tipo: "programacion", descripcion: "Aplicaciones para Android e iOS", miembros: 55 },
            
            // Octavo Semestre
            { id: 29, nombre: "Proyecto de Grado", semestre: 8, tipo: "gestion", descripcion: "Desarrollo del proyecto de tesis y trabajo final", miembros: 67 },
            { id: 30, nombre: "Emprendimiento Tecnologico", semestre: 8, tipo: "gestion", descripcion: "Creacion de empresas y negocios tecnologicos", miembros: 44 },
            { id: 31, nombre: "Big Data", semestre: 8, tipo: "programacion", descripcion: "Analisis de grandes volumenes de datos", miembros: 48 },
            { id: 32, nombre: "Cloud Computing", semestre: 8, tipo: "programacion", descripcion: "Servicios en la nube, AWS, Azure y despliegue", miembros: 46 }
        ];

        // Grupos a los que el usuario se ha unido
        let misGrupos = JSON.parse(localStorage.getItem('misGruposSistemas')) || [];

        // Variables de estado
        let gruposMostrados = [...gruposDisponibles];
        let semestreActivo = "todos";
        let tipoActivo = "todos";
        let textoBusqueda = "";

        // ========== INICIALIZACION ==========
        document.addEventListener('DOMContentLoaded', () => {
            mostrarGrupos();
            mostrarMisGrupos();
            configurarFiltros();
            configurarBuscador();
        });

        // ========== MOSTRAR GRUPOS DISPONIBLES ==========
        function mostrarGrupos() {
            const grid = document.getElementById('gridGrupos');
            
            if (gruposMostrados.length === 0) {
                grid.innerHTML = '<div class="sin-resultados">No se encontraron grupos</div>';
                return;
            }
            
            grid.innerHTML = gruposMostrados.map(grupo => {
                const yaUnido = misGrupos.some(mg => mg.id === grupo.id);
                return `
                    <div class="tarjeta-grupo">
                        <h3>${grupo.nombre}</h3>
                        <p>${grupo.descripcion}</p>
                        <div class="info-grupo">
                            <span class="semestre">Semestre ${grupo.semestre}</span>
                            <span class="tipo">${getNombreTipo(grupo.tipo)}</span>
                            <span class="miembros">Miembros: ${grupo.miembros}</span>
                        </div>
                        <button class="btn-unirse ${yaUnido ? 'unido' : ''}" onclick="unirseGrupo(${grupo.id})">
                            ${yaUnido ? 'Unido' : 'Unirse al Grupo'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ========== MOSTRAR MIS GRUPOS ==========
        function mostrarMisGrupos() {
            const container = document.getElementById('misGruposGrid');
            
            if (misGrupos.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#6c757d; grid-column:1/-1;">No estas inscrito en ningun grupo</div>';
                return;
            }
            
            container.innerHTML = misGrupos.map(grupo => `
                <div class="mi-grupo-card">
                    <div class="mi-grupo-info">
                        <h4>${grupo.nombre}</h4>
                        <p>Semestre ${grupo.semestre} - ${getNombreTipo(grupo.tipo)}</p>
                    </div>
                    <button class="btn-salir" onclick="salirGrupo(${grupo.id})">Salir</button>
                </div>
            `).join('');
        }

        // ========== UNIRSE A GRUPO ==========
        function unirseGrupo(id) {
            const grupo = gruposDisponibles.find(g => g.id === id);
            if (!grupo) return;
            
            const yaUnido = misGrupos.some(mg => mg.id === id);
            
            if (yaUnido) {
                mostrarToast("Ya estas en este grupo");
                return;
            }
            
            misGrupos.push({ ...grupo });
            localStorage.setItem('misGruposSistemas', JSON.stringify(misGrupos));
            grupo.miembros++;
            
            mostrarToast(`Te has unido a ${grupo.nombre}`);
            
            mostrarGrupos();
            mostrarMisGrupos();
        }

        // ========== SALIR DE GRUPO ==========
        function salirGrupo(id) {
            const grupo = misGrupos.find(g => g.id === id);
            if (!grupo) return;
            
            if (confirm(`Salir del grupo "${grupo.nombre}"?`)) {
                misGrupos = misGrupos.filter(g => g.id !== id);
                localStorage.setItem('misGruposSistemas', JSON.stringify(misGrupos));
                
                const grupoOriginal = gruposDisponibles.find(g => g.id === id);
                if (grupoOriginal && grupoOriginal.miembros > 0) {
                    grupoOriginal.miembros--;
                }
                
                mostrarToast(`Has salido del grupo ${grupo.nombre}`);
                
                mostrarGrupos();
                mostrarMisGrupos();
            }
        }

        // ========== FILTRAR GRUPOS ==========
        function filtrarGrupos() {
            let filtrados = [...gruposDisponibles];
            
            if (semestreActivo !== 'todos') {
                filtrados = filtrados.filter(grupo => grupo.semestre === parseInt(semestreActivo));
            }
            
            if (tipoActivo !== 'todos') {
                filtrados = filtrados.filter(grupo => grupo.tipo === tipoActivo);
            }
            
            if (textoBusqueda.trim() !== '') {
                filtrados = filtrados.filter(grupo => 
                    grupo.nombre.toLowerCase().includes(textoBusqueda.toLowerCase()) ||
                    grupo.descripcion.toLowerCase().includes(textoBusqueda.toLowerCase())
                );
            }
            
            gruposMostrados = filtrados;
            mostrarGrupos();
        }

        // ========== CONFIGURAR FILTROS ==========
        function configurarFiltros() {
            document.querySelectorAll('.btn-semestre').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-semestre').forEach(b => b.classList.remove('activo'));
                    btn.classList.add('activo');
                    semestreActivo = btn.getAttribute('data-semestre');
                    filtrarGrupos();
                });
            });
            
            document.querySelectorAll('.btn-filtro').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('activo'));
                    btn.classList.add('activo');
                    tipoActivo = btn.getAttribute('data-tipo');
                    filtrarGrupos();
                });
            });
        }

        // ========== CONFIGURAR BUSCADOR ==========
        function configurarBuscador() {
            const buscador = document.getElementById('buscador');
            buscador.addEventListener('input', (e) => {
                textoBusqueda = e.target.value;
                filtrarGrupos();
            });
        }

        // ========== UTILIDADES ==========
        function getNombreTipo(tipo) {
            const tipos = {
                'programacion': 'Programacion',
                'matematicas': 'Matematicas',
                'ciencias': 'Ciencias Basicas',
                'gestion': 'Gestion'
            };
            return tipos[tipo] || tipo;
        }

        function mostrarToast(mensaje) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensaje;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
